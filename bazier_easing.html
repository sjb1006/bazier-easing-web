<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贝塞尔缓动 (p1 p2范围 -1~2 | 4位小数 | 步进0.1)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        body {
            background: #f3f3f3;
            padding: 20px;
        }
        .wrap {
            max-width: 720px;
            margin: 0 auto;
        }
        canvas {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
            display: block;
            margin-bottom: 25px;
        }
        .control {
            background: #fff;
            padding: 18px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .slider-row {
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        label {
            width: 60px;
            font-size: 15px;
            font-weight: 500;
            flex-shrink: 0;
        }
        input[type="range"] {
            flex: 1;
            max-width: 360px;
        }
        .num-input {
            width: 90px;
            text-align: center;
            font-size: 14px;
            color: #222;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 5px 6px;
            background: #fff;
            cursor: text;
            font-family: monospace;
            flex-shrink: 0;
        }
        .num-input:focus {
            outline: none;
            border-color: #2980b9;
            box-shadow: 0 0 0 2px rgba(41, 128, 185, 0.2);
        }
        .step-btn {
            width: 28px;
            height: 28px;
            border: 1px solid #bbb;
            border-radius: 4px;
            background: #f7f7f7;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.12s, border-color 0.12s;
            line-height: 1;
            padding: 0;
        }
        .step-btn:hover {
            background: #e8e8e8;
            border-color: #999;
        }
        .step-btn:active {
            background: #d4d4d4;
            border-color: #888;
        }
        .step-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        .desc {
            margin-top: 12px;
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }
        .warning {
            margin-top: 10px;
            font-size: 12px;
            color: #e67e22;
            background: #fef5e7;
            padding: 6px 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <canvas id="curveCanvas" width="650" height="450"></canvas>

        <div class="control">
            <div class="slider-row">
                <label>p1</label>
                <input type="range" id="p1" min="-1" max="2" step="0.01" value="0.2">
                <input type="number" id="p1Input" class="num-input" step="0.1" min="-1" max="2" value="0.2">
                <button class="step-btn" data-target="p1" data-delta="-0.1" title="减小 p1（步进 0.1）">−</button>
                <button class="step-btn" data-target="p1" data-delta="0.1" title="增大 p1（步进 0.1）">+</button>
            </div>
            <div class="slider-row">
                <label>p2</label>
                <input type="range" id="p2" min="-1" max="2" step="0.01" value="0.8">
                <input type="number" id="p2Input" class="num-input" step="0.1" min="-1" max="2" value="0.8">
                <button class="step-btn" data-target="p2" data-delta="-0.1" title="减小 p2（步进 0.1）">−</button>
                <button class="step-btn" data-target="p2" data-delta="0.1" title="增大 p2（步进 0.1）">+</button>
            </div>
            <div class="desc">
                计算公式：y = 3·t·(1-t)²·p1 + 3·t²·(1-t)·p2 + t³<br>
                横轴：时间 t (0 → 1) &nbsp; 纵轴：缓动输出值 (可超出 0-1 范围)
            </div>
            <div class="warning">
                ⚠️ p1, p2 范围 -1 ~ 2，曲线可能超出 [0,1] 边界（回弹/过冲效果）<br>
                ✏️ 可直接输入数字，或使用右侧 +/− 按钮以 0.1 为步长调节（单击只变动一次）<br>
                🔢 输入时曲线实时变化；数值最多精确到 4 位小数，输入几位就显示几位
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('curveCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;

        const pad = 40;
        const areaW = W - pad * 2;
        const areaH = H - pad * 2;
        const gridStep = 0.1;

        const p1Slider = document.getElementById('p1');
        const p2Slider = document.getElementById('p2');
        const p1Input = document.getElementById('p1Input');
        const p2Input = document.getElementById('p2Input');

        const MIN_VAL = -1;
        const MAX_VAL = 2;
        const MAX_DECIMALS = 4;
        const BUTTON_STEP = 0.1;

        // 所有步进按钮
        const allStepBtns = document.querySelectorAll('.step-btn');

        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        // 格式化显示值：四舍五入到最多4位小数，去掉尾部零
        function formatDisplayValue(val) {
            const factor = Math.pow(10, MAX_DECIMALS);
            const rounded = Math.round(val * factor) / factor;
            return rounded.toString();
        }

        // 在 blur/change 时保留用户输入的精度（最多4位小数）
        function formatWithInputPrecision(rawStr, val) {
            val = clamp(val, MIN_VAL, MAX_VAL);
            const dotIndex = rawStr.indexOf('.');
            let decimals = 0;
            if (dotIndex !== -1) {
                decimals = rawStr.length - dotIndex - 1;
            }
            decimals = Math.min(decimals, MAX_DECIMALS);
            const factor = Math.pow(10, decimals);
            const rounded = Math.round(val * factor) / factor;
            return rounded.toFixed(decimals);
        }

        // 核心公式
        function calcEase(t, p1, p2) {
            const omt = 1 - t;
            return 3 * t * omt * omt * p1 + 3 * t * t * omt * p2 + t * t * t;
        }

        function getX(t) {
            return pad + t * areaW;
        }

        function getCurveYRange(p1, p2) {
            let minY = Infinity,
                maxY = -Infinity;
            for (let t = 0; t <= 1; t += 0.01) {
                const y = calcEase(t, p1, p2);
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
            }
            const yStart = calcEase(0, p1, p2);
            const yEnd = calcEase(1, p1, p2);
            minY = Math.min(minY, yStart, yEnd);
            maxY = Math.max(maxY, yStart, yEnd);
            return { minY, maxY };
        }

        function drawAxis(yMin, yMax) {
            ctx.clearRect(0, 0, W, H);
            const mapY = (val) => H - pad - ((val - yMin) / (yMax - yMin)) * areaH;

            // 网格
            ctx.strokeStyle = '#e5e5e5';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 1; i += gridStep) {
                const x = getX(i);
                ctx.beginPath();
                ctx.moveTo(x, pad);
                ctx.lineTo(x, H - pad);
                ctx.stroke();
            }
            const yStep = (yMax - yMin) / 10;
            for (let v = yMin; v <= yMax + 0.001; v += yStep) {
                const y = mapY(v);
                if (y >= pad && y <= H - pad) {
                    ctx.beginPath();
                    ctx.moveTo(pad, y);
                    ctx.lineTo(W - pad, y);
                    ctx.stroke();
                }
            }

            // 坐标轴
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(pad, H - pad);
            ctx.lineTo(W - pad, H - pad);
            ctx.moveTo(pad, H - pad);
            ctx.lineTo(pad, pad);
            ctx.stroke();

            // X轴刻度
            ctx.fillStyle = '#555';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'center';
            for (let t = 0; t <= 1; t += gridStep) {
                const x = getX(t);
                ctx.beginPath();
                ctx.moveTo(x, H - pad);
                ctx.lineTo(x, H - pad + 5);
                ctx.stroke();
                ctx.fillText(t.toFixed(1), x, H - pad + 18);
            }

            // Y轴动态刻度
            ctx.textAlign = 'right';
            const majorYVals = [];
            for (let v = Math.floor(yMin * 2) / 2; v <= Math.ceil(yMax * 2) / 2 + 0.1; v += 0.5) {
                const rounded = Math.round(v * 10) / 10;
                if (rounded >= yMin - 0.01 && rounded <= yMax + 0.01 && !majorYVals.includes(rounded))
                    majorYVals.push(rounded);
            }
            if (yMin <= 0 && yMax >= 0 && !majorYVals.includes(0)) majorYVals.push(0);
            if (yMin <= 1 && yMax >= 1 && !majorYVals.includes(1)) majorYVals.push(1);
            majorYVals.sort((a, b) => a - b);
            for (let v of majorYVals) {
                const y = mapY(v);
                if (y >= pad && y <= H - pad) {
                    ctx.beginPath();
                    ctx.moveTo(pad - 5, y);
                    ctx.lineTo(pad, y);
                    ctx.stroke();
                    ctx.fillText(v.toFixed(1), pad - 8, y + 4);
                }
            }

            // 参考线 y=0, y=1
            ctx.save();
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = '#ff9999';
            ctx.lineWidth = 1;
            if (yMin <= 0 && yMax >= 0) {
                const y0 = mapY(0);
                ctx.beginPath();
                ctx.moveTo(pad, y0);
                ctx.lineTo(W - pad, y0);
                ctx.stroke();
                ctx.fillStyle = '#ff8888';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText('y=0', pad + 5, y0 - 2);
            }
            if (yMin <= 1 && yMax >= 1) {
                const y1 = mapY(1);
                ctx.beginPath();
                ctx.moveTo(pad, y1);
                ctx.lineTo(W - pad, y1);
                ctx.stroke();
                ctx.fillStyle = '#ff8888';
                ctx.fillText('y=1', pad + 5, y1 - 2);
            }
            ctx.setLineDash([]);
            ctx.restore();

            return { mapY };
        }

        function drawCurve(p1, p2) {
            const { minY, maxY } = getCurveYRange(p1, p2);
            const range = maxY - minY;
            const padding = Math.max(0.15, range * 0.15);
            const yMin = Math.min(-0.2, minY - padding);
            const yMax = Math.max(1.2, maxY + padding);

            drawAxis(yMin, yMax);

            const getYCustom = (val) => H - pad - ((val - yMin) / (yMax - yMin)) * areaH;

            ctx.strokeStyle = '#2980b9';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            let t = 0;
            let isFirst = true;
            while (t <= 1) {
                const y = calcEase(t, p1, p2);
                const xPos = getX(t);
                const yPos = getYCustom(y);
                if (yPos >= pad - 10 && yPos <= H - pad + 10) {
                    if (isFirst) {
                        ctx.moveTo(xPos, yPos);
                        isFirst = false;
                    } else {
                        ctx.lineTo(xPos, yPos);
                    }
                } else {
                    isFirst = true;
                    ctx.moveTo(xPos, yPos);
                }
                t += 0.004;
            }
            ctx.stroke();

            // 采样点
            ctx.fillStyle = '#e67e22';
            for (let t2 = 0; t2 <= 1; t2 += 0.025) {
                const y = calcEase(t2, p1, p2);
                const xPos = getX(t2);
                const yPos = getYCustom(y);
                if (yPos >= pad - 5 && yPos <= H - pad + 5) {
                    ctx.beginPath();
                    ctx.arc(xPos, yPos, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // 起点 & 终点
            const yStart = calcEase(0, p1, p2);
            const yEnd = calcEase(1, p1, p2);
            const startX = getX(0);
            const startY = getYCustom(yStart);
            const endX = getX(1);
            const endY = getYCustom(yEnd);
            ctx.fillStyle = '#2c3e50';
            ctx.beginPath();
            ctx.arc(startX, startY, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#c0392b';
            ctx.beginPath();
            ctx.arc(endX, endY, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.font = 'bold 11px sans-serif';
            ctx.fillStyle = '#2c3e50';
            ctx.fillText('起点', startX + 6, startY - 4);
            ctx.fillStyle = '#c0392b';
            ctx.fillText('终点', endX + 6, endY - 4);

            // 辅助点
            ctx.font = '9px sans-serif';
            for (let tCtrl of [0.25, 0.5, 0.75]) {
                const yCtrl = calcEase(tCtrl, p1, p2);
                const xCtrl = getX(tCtrl);
                const yCtrlPos = getYCustom(yCtrl);
                if (yCtrlPos >= pad && yCtrlPos <= H - pad) {
                    ctx.beginPath();
                    ctx.arc(xCtrl, yCtrlPos, 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = '#9b59b6';
                    ctx.fill();
                }
            }
        }

        // 更新按钮禁用状态
        function updateButtonStates(inputElem, minusBtn, plusBtn) {
            const val = parseFloat(inputElem.value);
            if (isNaN(val)) {
                minusBtn.disabled = false;
                plusBtn.disabled = false;
                return;
            }
            minusBtn.disabled = (val <= MIN_VAL);
            plusBtn.disabled = (val >= MAX_VAL);
        }

        // 获取输入框关联的按钮
        function getAssociatedButtons(inputElem) {
            const row = inputElem.closest('.slider-row');
            const btns = row.querySelectorAll('.step-btn');
            const minusBtn = btns[0]; // 第一个是减号按钮
            const plusBtn = btns[1]; // 第二个是加号按钮
            return { minusBtn, plusBtn };
        }

        // 从滑块同步到输入框并重绘
        function updateFromSliders() {
            const p1 = parseFloat(p1Slider.value);
            const p2 = parseFloat(p2Slider.value);
            const p1Val = formatDisplayValue(p1);
            const p2Val = formatDisplayValue(p2);
            if (p1Input.value !== p1Val) p1Input.value = p1Val;
            if (p2Input.value !== p2Val) p2Input.value = p2Val;
            drawCurve(p1, p2);
            // 更新按钮状态
            const btns1 = getAssociatedButtons(p1Input);
            const btns2 = getAssociatedButtons(p2Input);
            updateButtonStates(p1Input, btns1.minusBtn, btns1.plusBtn);
            updateButtonStates(p2Input, btns2.minusBtn, btns2.plusBtn);
        }

        // 从输入框同步到滑块（用于 input 事件 - 实时更新但不修改输入框值）
        function syncInputToSliderRealtime(inputElem, sliderElem) {
            let raw = inputElem.value.trim();
            if (raw === "" || raw === "-" || raw === "." || raw === "-.") return;
            let val = parseFloat(raw);
            if (isNaN(val)) return;
            val = clamp(val, MIN_VAL, MAX_VAL);
            sliderElem.value = val;
            const p1 = parseFloat(p1Slider.value);
            const p2 = parseFloat(p2Slider.value);
            drawCurve(p1, p2);
            // 更新按钮状态
            const btns1 = getAssociatedButtons(p1Input);
            const btns2 = getAssociatedButtons(p2Input);
            updateButtonStates(p1Input, btns1.minusBtn, btns1.plusBtn);
            updateButtonStates(p2Input, btns2.minusBtn, btns2.plusBtn);
        }

        // 从输入框同步到滑块（用于 change/blur 事件 - 格式化并更新）
        function syncInputToSliderFinal(inputElem, sliderElem) {
            let raw = inputElem.value.trim();
            if (raw === "" || raw === "-" || raw === "." || raw === "-.") {
                // 无效输入，恢复为滑块当前值
                const sliderVal = parseFloat(sliderElem.value);
                inputElem.value = formatDisplayValue(sliderVal);
                const p1 = parseFloat(p1Slider.value);
                const p2 = parseFloat(p2Slider.value);
                drawCurve(p1, p2);
                const btns1 = getAssociatedButtons(p1Input);
                const btns2 = getAssociatedButtons(p2Input);
                updateButtonStates(p1Input, btns1.minusBtn, btns1.plusBtn);
                updateButtonStates(p2Input, btns2.minusBtn, btns2.plusBtn);
                return;
            }
            let val = parseFloat(raw);
            if (isNaN(val)) {
                const sliderVal = parseFloat(sliderElem.value);
                inputElem.value = formatDisplayValue(sliderVal);
                const p1 = parseFloat(p1Slider.value);
                const p2 = parseFloat(p2Slider.value);
                drawCurve(p1, p2);
                const btns1 = getAssociatedButtons(p1Input);
                const btns2 = getAssociatedButtons(p2Input);
                updateButtonStates(p1Input, btns1.minusBtn, btns1.plusBtn);
                updateButtonStates(p2Input, btns2.minusBtn, btns2.plusBtn);
                return;
            }
            val = clamp(val, MIN_VAL, MAX_VAL);
            sliderElem.value = val;
            // 使用保留精度的格式化
            const formatted = formatWithInputPrecision(raw, val);
            if (inputElem.value !== formatted) inputElem.value = formatted;
            const p1 = parseFloat(p1Slider.value);
            const p2 = parseFloat(p2Slider.value);
            drawCurve(p1, p2);
            // 更新按钮状态
            const btns1 = getAssociatedButtons(p1Input);
            const btns2 = getAssociatedButtons(p2Input);
            updateButtonStates(p1Input, btns1.minusBtn, btns1.plusBtn);
            updateButtonStates(p2Input, btns2.minusBtn, btns2.plusBtn);
        }

        // 按钮点击处理
        function handleStepButtonClick(btn) {
            const target = btn.getAttribute('data-target');
            const delta = parseFloat(btn.getAttribute('data-delta'));
            const inputElem = target === 'p1' ? p1Input : p2Input;
            const sliderElem = target === 'p1' ? p1Slider : p2Slider;

            let currentVal = parseFloat(inputElem.value);
            if (isNaN(currentVal)) {
                currentVal = parseFloat(sliderElem.value);
                if (isNaN(currentVal)) currentVal = 0;
            }
            let newVal = currentVal + delta;
            newVal = clamp(newVal, MIN_VAL, MAX_VAL);
            // 四舍五入到合理精度（避免浮点误差如 0.30000000000000004）
            const factor = Math.pow(10, MAX_DECIMALS);
            newVal = Math.round(newVal * factor) / factor;
            const displayStr = formatDisplayValue(newVal);
            inputElem.value = displayStr;
            sliderElem.value = newVal;
            const p1 = parseFloat(p1Slider.value);
            const p2 = parseFloat(p2Slider.value);
            drawCurve(p1, p2);
            // 更新按钮状态
            const btns1 = getAssociatedButtons(p1Input);
            const btns2 = getAssociatedButtons(p2Input);
            updateButtonStates(p1Input, btns1.minusBtn, btns1.plusBtn);
            updateButtonStates(p2Input, btns2.minusBtn, btns2.plusBtn);
        }

        // === 事件监听 ===

        // 滑块
        p1Slider.addEventListener('input', updateFromSliders);
        p2Slider.addEventListener('input', updateFromSliders);

        // 输入框 - input 事件（实时更新曲线，不修改输入框值）
        p1Input.addEventListener('input', () => syncInputToSliderRealtime(p1Input, p1Slider));
        p2Input.addEventListener('input', () => syncInputToSliderRealtime(p2Input, p2Slider));

        // 输入框 - change 事件（格式化并更新）
        p1Input.addEventListener('change', () => syncInputToSliderFinal(p1Input, p1Slider));
        p2Input.addEventListener('change', () => syncInputToSliderFinal(p2Input, p2Slider));

        // 输入框 - blur 事件（格式化并更新）
        p1Input.addEventListener('blur', () => syncInputToSliderFinal(p1Input, p1Slider));
        p2Input.addEventListener('blur', () => syncInputToSliderFinal(p2Input, p2Slider));

        // 步进按钮 - click 事件（只触发一次，不持续检测）
        allStepBtns.forEach(btn => {
            btn.addEventListener('click', () => handleStepButtonClick(btn));
        });

        // 初始化
        updateFromSliders();
    </script>
</body>
</html>
